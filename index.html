<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OT Claim Builder - Split Smart</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f6fa}
.container{display:flex;height:100vh}

/* LEFT PANEL */
.left{
width:50%;
padding:16px;
overflow:auto;
background:#fff;
border-right:1px solid #ddd;
}

/* RIGHT PANEL */
.right{
width:50%;
height:100%;
}

iframe{
width:100%;
height:100%;
border:none;
}

h2{margin-top:0}
button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#007bff;
color:#fff;
cursor:pointer;
margin-top:8px;
}
textarea{
width:100%;
height:120px;
margin-top:8px;
}
table{
width:100%;
border-collapse:collapse;
margin-top:12px;
font-size:13px;
}
th,td{
border:1px solid #ddd;
padding:6px;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT: ANALYSER -->
<div class="left">

<h2>PrePlanned OT</h2>

<button onclick="openSP()">Open SharePoint</button>

<p>Upload Excel OR paste rows</p>

<input type="file" id="file">

<textarea id="paste" placeholder="Paste SharePoint rows here"></textarea>
<button onclick="parsePaste()">Analyse Paste</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Team</th>
<th>Type</th>
</tr>
</thead>
<tbody id="result"></tbody>
</table>

<button onclick="exportExcel()">Export</button>

</div>

<!-- RIGHT: SHAREPOINT VIEW -->
<div class="right">

<iframe src="https://certiscisco-my.sharepoint.com/personal/liang_chee_weng_certisgroup_com/_layouts/15/Doc.aspx?sourcedoc={f3b64f6d-79a4-4a09-9d15-6ac808a7874a}&action=embedview&wdAllowInteractivity=False&wdDownloadButton=True"></iframe>

</div>

</div>

<script>

function openSP(){
window.open("https://certiscisco.sharepoint.com/:x:/r/sites/CASCSSU/_layouts/15/doc2.aspx?sourcedoc=%7BC52400BC-052C-47FD-94BB-69F9044C4D09%7D&file=T2%20Roster%20New.xlsx&action=default","_blank");
}

document.getElementById("file").addEventListener("change", function(e){
const reader = new FileReader();
reader.onload = function(evt){
const data = new Uint8Array(evt.target.result);
const wb = XLSX.read(data, {type:"array"});
const sheet = wb.Sheets[wb.SheetNames[0]];
const json = XLSX.utils.sheet_to_json(sheet, {header:1});

processData(json);
};
reader.readAsArrayBuffer(e.target.files[0]);
});

function parsePaste(){
let text = document.getElementById("paste").value;
let rows = text.split("\n").map(r=>r.split("\t"));
processData(rows);
}

function processData(rows){
let tbody = document.getElementById("result");
tbody.innerHTML="";

let header = rows[0];

let idCol = header.findIndex(h=>h.toString().toUpperCase().includes("ID"));
let nameCol = header.findIndex(h=>h.toString().toUpperCase().includes("NAME"));
let teamCol = header.findIndex(h=>h.toString().toUpperCase().includes("TEAM"));

for(let i=1;i<rows.length;i++){
let row = rows[i];

for(let c=teamCol+1;c<row.length;c++){
let val = (row[c]||"").toString().toUpperCase();

if(val==="2" || val==="OT2"){
let tr = document.createElement("tr");

tr.innerHTML = `
<td>${row[idCol]}</td>
<td>${clean(row[nameCol])}</td>
<td>${row[teamCol]}</td>
<td>${val}</td>
`;

tbody.appendChild(tr);
}
}
}
}

function clean(name){
return (name||"").replace(/\((X|NX)\)/gi,"").trim();
}

function exportExcel(){
let wb = XLSX.utils.table_to_book(document.querySelector("table"));
XLSX.writeFile(wb,"PrePlanned OT Result.xlsx");
}

</script>

</body>
</html>
